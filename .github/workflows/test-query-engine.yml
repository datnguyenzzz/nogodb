name: Test Query Engine

on:
  push:
    branches: [ master, main ]
    paths:
      - 'query_engine/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'query_engine/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          query_engine/target
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('query_engine/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run cargo test
      working-directory: query_engine
      run: |
        cargo test --all-targets -- --nocapture

    - name: Build release binary
      working-directory: query_engine
      run: cargo build --release --bin nogodb_cli
